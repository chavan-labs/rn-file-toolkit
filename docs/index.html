<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="rn-file-toolkit documentation" />
    <title>rn-file-toolkit docs</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css"
    />
    <style>
      :root {
        --theme-color: #2563eb;
      }
      .markdown-section {
        max-width: 920px;
      }
      .app-name-link img {
        max-height: 40px;
      }
    </style>
  </head>
  <body>
    <div id="app">Loading docs…</div>
    <script>
      window.$docsify = {
        name: 'rn-file-toolkit',
        repo: 'https://github.com/chavan-labs/rn-file-toolkit',
        loadSidebar: true,
        auto2top: true,
        subMaxLevel: 2,
        search: 'auto',
      };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  </body>
</html>
